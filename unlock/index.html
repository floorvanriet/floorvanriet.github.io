<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#3253a2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SuperReader">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SuperReader</title>
  <link rel="stylesheet" href="unlock.css">
</head>
<body>
  <main id="chooser" hidden>
    <header>
      <h1>SuperReader</h1>
      <p class="subtitle">Open een artikel in plain-text reader via archief-diensten.</p>
    </header>

    <form id="urlform" autocomplete="off">
      <input
        type="url"
        id="urlinput"
        name="url"
        placeholder="https://…"
        inputmode="url"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        required>
      <button type="submit">Ontgrendel</button>
    </form>

    <ol id="results" aria-live="polite"></ol>

    <details class="help">
      <summary>Toevoegen aan iOS deelmenu</summary>
      <p>Bouw een Apple Shortcut die URLs ontvangt uit het deelmenu en
      deze pagina opent met <code>?url=&lt;originele URL&gt;</code>. Zie
      <a href="/shortcut.html">instructies</a>.</p>
    </details>
  </main>

  <section id="loading" hidden>
    <div class="spinner big" aria-hidden="true"></div>
    <p class="loading-status" id="loadingStatus">Bezig…</p>
  </section>

  <article id="reader" hidden>
    <header class="reader-header">
      <h1 id="readerTitle"></h1>
      <p class="reader-meta" id="readerMeta"></p>
    </header>
    <div class="reader-content" id="readerContent"></div>
    <footer class="reader-footer">
      <a id="linkOriginal" target="_blank" rel="noopener">Origineel</a>
      <span>·</span>
      <a id="linkSnapshot" target="_blank" rel="noopener">Snapshot</a>
      <span>·</span>
      <a href="/unlock/">Nieuwe URL</a>
    </footer>
  </article>

  <script src="vendor/Readability.js" defer></script>
  <script src="unlock.js" defer></script>
</body>
</html>
