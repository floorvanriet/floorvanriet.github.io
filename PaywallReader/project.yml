name: PaywallReader
options:
  bundleIdPrefix: com.floorvanriet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: nl
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"

packages:
  UnlockKit:
    path: Packages/UnlockKit

targets:
  PaywallReader:
    type: application
    platform: iOS
    sources:
      - path: PaywallReader
        excludes:
          - Info.plist
          - PaywallReader.entitlements
    resources:
      - path: PaywallReader/Assets.xcassets
    info:
      path: PaywallReader/Info.plist
      properties:
        CFBundleDisplayName: PaywallReader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: PaywallReader/PaywallReader.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.floorvanriet.PaywallReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floorvanriet.PaywallReader
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: UnlockKit
      - target: ShareExtension
        embed: true
        codeSign: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - Info.plist
          - ShareExtension.entitlements
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: PaywallReader
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.floorvanriet.PaywallReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.floorvanriet.PaywallReader.ShareExtension
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
    dependencies:
      - package: UnlockKit

schemes:
  PaywallReader:
    build:
      targets:
        PaywallReader: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: UnlockKit/UnlockKitTests
          package: UnlockKit
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
